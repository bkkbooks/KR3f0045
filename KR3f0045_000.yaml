  text: 欽定四庫全書子部六
  hash: sha256:e521b19b98c66f823ee87bbea51ca642449b8543c55a824c23637d49bb62d81e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0045_WYG_000-1a, image: WYG0798/WYG0798-0305a.png}
body:
  text: 弧矢算術天文算法類二算書之屬提要臣等謹案弧矢算術一卷明顧應祥撰應祥有人代紀要巳著録弧矢之法始於元郭守敬授時厯草其有弧背求矢草立天元一為矢云云反覆求之至得三乘方積數及廉隅縱數而止不載開方算式大抵開諸乘方法尚為當時疇人所習抑或别有専書皆不可知其弦矢相求及弧容直濶諸法皆以勾股法御之明唐順之謂為步日躔月離源頭作弧矢論以示顧應祥應祥遂演為是書名其編曰弧矢算術應祥未明立天元一法故置之不論惟補其開帶縱三乘之式並詳各弦矢相求之法與測圓海鏡分類釋術之作相同亦専備其數使學者可考而已乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀弧矢算術序弧矢一術古今算法所載者絶少錢唐吳信民九章法止載一條四元玉鑑所載數條皆不言其所以然之故沈存中夢溪筆談有割圓之法雖自謂造微然止於徑矢求弦而於弧背求矢截積求矢諸法俱未備豫每病之南曹訟牒頗暇乃取諸家算書間附己意各立一法名曰弧矢算術藏諸篋笥俟高明之士取正焉未敢謂盡得其閫奧也嘉靖壬子春三月吉吳興顧應祥識弧矢論說弧矢者割圓之法也割平圓之旁狀若弧矢故謂之弧矢其背曲曰弧背其弦直曰弧弦其中衡曰矢而皆取法於徑徑也者平圓中心之徑也背有曲直弦有修短係于圓之大小圓大則徑長圓小則徑短非徑無以定之故曰取則于徑而其法不出於勾股開方之術以矢求弦則以半徑為弦半徑减矢為股股弦各自乘相减餘為實平方開之得勾勾即半截弦也以弦求矢亦以半徑為弦半截弦為勾勾弦各自乘相减餘為實平方開之得股股乃半徑减矢之餘也以减半徑即矢或以矢减全徑為勾股和以矢為勾股較乘之亦得勾算即半截弦算也矢自乘圓徑除之得半背弦差倍以加弦即弧背以半背弦差除矢算亦得圓徑半截弦自乘為實以矢除之得矢徑差加矢即圓徑以矢加弦以矢乘而半之即所截之積也倍截積以矢除之减矢即弦倍截積以弦為從方開之即矢惟弧背與徑求矢截積與徑求矢開方不能盡用三乘方法開之弧背求矢以半弧背算與徑算相乘為實徑乘徑算為從方徑算為上亷全背與徑相乘為下亷約矢乘上亷以减從方以矢自乘以减下亷又以矢乘餘下亷與减餘從方為法除實得矢曷為以矢乘上廉减從方也蓋從方乃徑與徑算相乘其中多一矢乘徑算之數故减之曷為又以矢自乘以减下亷也下亷乃背徑相乘其中多一矢自乘之數故亦减之减之則法與實相合矣以截積求矢則倍積自乘為實四因積為上亷四因徑為下亷五為負隅約矢以隅因之以减下亷又以矢一度乘上亷兩度乘下亷併而為法矢减下亷者何也矢本减徑而得故减徑以求之五為負隅者何也凡以方為圓每一寸得虛隅二分五釐四其虛隅與四其矢合而為五也四其亷者何也倍積則乘出之數為積者四故亦四其亷以就之升法以就實也若以截弦與截餘外周求矢則以弦算半弦算相乘四而三之為實併弦及餘周為益方半弦乘弦加弦算為從上亷併亷及餘周為下亷以約出之矢乘上亷又以矢自乘再乘為隅法併上亷以减益方矢自之以乘下亷併减餘從方為法除實得矢方圓論說附世之習算者咸以方五斜七圍三徑一為凖殊不知方五則斜七有奇徑一則圍三有奇故古人立法有勾三股四弦五之論而不能使方斜為一定之法有割圓矢弦之論而不能使方圓為一定之法試以勾股法求之勾股各自乘併為弦實平方開之此施之於長直方則可若一整方勾五股五各自乘併得五十平方開之得七而又多一算矣割圓之法求矢求弦固是至於求弧背則恐未盡也何以知之試以平圓徑十寸者例之中心剖開矢闊五寸自乘得二十五寸以徑除之得二寸五分為半背弦差倍之得五寸以加弦得一十五寸與圍三徑一之論正合然徑一則圍三有竒奇數則不能盡矣以是知弧背之說猶未盡也不特是也凡平圓一十二立圓三十六皆不過取其大較耳或曰密率徑七則圍二十二徽率徑五十則圍一百五十七何不取二術酌之以立一定之法曰二術以圓為方以方為圓非不可但其還原與原數不合數多則散漫難收故算厯者止用徑一圍三亦勢之不得已也曰厯家以徑一圍三立法則其數似猶未精然郭守敬之厯至今行之無弊何也曰厯家以萬分為度秒以下皆不録縱有小差不出於一度之中况所謂黃赤道弧背度乃測驗而得止以徑一圍三定其平差立差耳雖然行之日久安保其不差也竊嘗思之天地之道隂陽而已方圓天地也方象法地靜而有質故可以象數求之圓象法天動而無形故不可以象數求之方體本靜而中斜者乃動而生陽者也圓體本動而中心之徑乃靜而根隂者也天外陽而內隂地外隂而內陽隂陽交錯而萬物化生其機正在於奇零不齊之處上智不能測巧厯不能盡者也向使天地之道俱可以限量求之則化機有盡而不能生萬物矣余因論方圓之法而併著其理如此
