body:
  text: 弧矢算術明顧應祥撰圓徑與截矢求截弦術曰半徑為弦半徑減矢為股各自乘相減餘為勾算平方開之得勾即半截弦又曰以矢減徑以矢乘之即半截弦算圓徑十寸從旁截一弧矢闊一寸問截弦答曰六寸術曰半徑自之得二十五半徑減矢自之得一十六寸相減餘九平方開之得三倍之即截弦又曰圓徑自之得一百為弦算圓徑減倍矢自之得六十四為股算相減餘三十六為勾算平方開之得全弦圓徑十三步截矢闊四步問截弦答曰十二步術曰半徑算四十二步二五減矢半徑算六步二五相減餘三十六步為勾算又曰全徑算一百六十九減倍矢徑算二十五相減餘一百四十四平方開之得全截弦圓徑九十步截矢九步問截弦答曰五十四步術同圓材徑二尺五寸鋸板欲厚七寸問闊幾何答曰板闊二尺四寸術曰圓徑為弦自之得六十二尺五寸板厚為勾自之得四尺九寸相減得五十七尺六寸為股算平方開之闕商得一寸置一於左上為法置一乘上亷仍得一十四寸置一隅因得五以減下亷餘三十五寸置一自之以乘下亷仍得三十五寸併上亷得四十九為下法圓徑九十步從旁截積二百八十三步半問截矢答曰矢九步術曰倍積自之得三十二萬一千四百八十九步為正實四因積得一千一百三十四為上亷四因徑得三百六十為下亷五為負隅商得九置一於左上為法置一乘上亷得一萬二百六置一隅因得四十五以減下亷餘三百一十五置一自之以乘餘下亷得二萬五千五百一十五併上亷共二萬五千七百二十一為下法圓徑九十步從旁截積八百一十步問矢答曰矢一十八步術曰倍積自之得二百六十二萬四千四百為正實四因截積得三千二百四十為從上亷四因圓徑得三百六十為從下亷五為負隅初商一十置一於左上為法置一乘上亷得三萬二千四百置一以隅因之得五十以減從下亷餘三百一十置一自之以乘餘下亷得三萬一千併上亷共六萬三千四百為下法與上法相乘除實六十三萬四千餘實一百九十九萬四百未盡倍上亷得六萬四千八百初商自之三因得三百為下亷方法初商三之得三十為下亷亷法初商自乘再乘隅因得五千為下亷減隅次商八置一於左上為法置一乘上亷得二萬五千九百二十併倍上亷共九萬七百二十置一併入初商得一十八以隅因之得九十以減從下亷餘二百七十以方法乘之得八萬一千置一乘亷法得二百四十以乘餘下亷得六萬四千八百置一自之得六十四以乘餘下亷得一萬七千二百八十減去減隅五千止存一萬二千二百八十下亷方亷隅共一十五萬八千八十併上亷共二十四萬八千八百為下法與上法相乘除實盡又術次商八置一於左上為法倍初商加次商得二十八以乘上亷得九萬七百二十置一隅因得四十以減餘下亷止存二百七十倍初商加次商併初次商因之得五百四加初商自之一百共六百四以乘二百七十得一十六萬三千八十以初商自乘再乘隅因得五千減之止存一十五萬八千八十併上亷共二十四萬八千八百為下法又為添積開三乘方法術曰倍積自之得二百六十二萬四千四百為正實四因截積得三千二百四十為上亷四因圓徑得三百六十為下亷五為負隅初商一十置一於左上為法置一自之又自之得一萬為三乘方面以隅因之得五萬為益實加入正實得二百六十七萬四千四百為通實置一乘上亷得三萬二千四百置一自之以乘下亷得三萬六千併上亷共六萬八千四百為下法與上法相乘除實六十八萬四千餘實一百九十九萬四百未盡為次商正實次商八置一於左上為法置一加初商自之又自之得一十萬四千九百七十六為三乘方面以隅法因之得五十二萬四千八百八十內減初益實五萬餘四十七萬四千八百八十為益實加入次正實共二百四十六萬五千二百八十為通實倍初商加次商得二十八以乘上亷得九萬七百二十倍初商加次商得二十八併初次商一十八相因加初商自乘共六百四以乘下亷得二十一萬七千四百四十併上亷共三十萬八千一百六十與上法相乘除實盡圓徑八十九步從旁截積一千三百一十二步半問截矢答曰矢二十五步不用倍積術曰積自之得一百七十二萬二千六百五十六步二五截積一千三百一十二步半為上亷徑八十九步為下亷以一步二分五釐為負隅初商二十置一於左上為法置一乘上亷得二萬六千二百五十置一以隅因之得二十五以減下亷餘六十四置一自之以乘餘下亷得二萬五千六百併上亷得五萬一千八百五十為下法與上法相乘除實一百三萬七千餘實六十八萬五千六百五十六步二五未盡次商五置一於左上為法置一以隅因之得六步二分五釐以減餘下亷餘五十七步七分五釐倍初商加次商得四十五以乘上亷得五萬九千六十二半倍初商加次商併初次商因之得一千一百二十五加初商自之四百共一千五百二十五以乘餘下亷得八萬八千六十八步七五內減初商自乘再乘隅因一萬止存七萬八千六十八步七五併上亷共一十三萬七千一百三十一步二五與上法相乘除實盡解曰弧矢狀類勾股勾股得直方之半故倍其積以股除之即得勾弧背曲倍積則長一弦而又一矢以矢乘積倍之恰得一弦一矢之數因未知矢故以積自乘為實約矢一度乘積以為上亷兩度乘徑以為下亷併之為法而後可以得矢用三乘者何也積本平方以積乘積是兩度平方矣故用三乘方法開之上亷下亷俱用四因者何也倍積則乘出之數為積者四故上下亷俱四以就之減徑者何也徑乃圓之全徑矢乃截處之勾矢本減徑而得故亦減徑以求矢五為負隅者何也凡平圓之積得平方四之三在內者七五在外者二五不拘圓之大小每方一尺該虛隅二寸五分四其矢得四四其虛隅得一合而為五亦升實就法之意如不倍積亷不用四因以一二五為隅法亦通或不減徑作添積三乘方法亦通圓徑與截積求截弦術曰倍積以矢除之減矢即弦又法用矢徑求弦術圓徑八十九步從旁截積一千三百一十二步半問截弦答曰弦八十步術曰倍積得二千六百二十五步以求出矢二十五除之得一百五步乃一弦一矢減矢即弦又曰倍矢減徑餘三十九自之得一千五百二十一為勾算全徑自之得七千九百二十一為弦算相減餘六千四百為股算平方開之若求弧背以徑除矢算即半背弦差圓徑與弧背求矢術曰半弧算徑算相乘為實徑乘徑算為從方徑算為上亷徑背相乘為下亷以上亷減從以隅減下亷三乘方法開之平圓徑十尺從旁截處弧背八尺八寸問矢答曰矢二尺術曰半弧背自之得一十九尺三寸六分徑自之得一百尺相乘得一千九百三十六尺為正實徑乘徑算得一千尺為從方徑算一百尺為上亷全背乘徑得八十八尺為下亷約商二尺置一於左上為法置一乘上亷得二百尺以減從方餘八百尺置一自之得四以減下亷餘八十四尺又以二乘餘下亷得一百六十八尺併從方共九百六十八尺為下法又術商矢減徑存八尺以矢乘之得十六平方開之即得半弦平圓徑九十步旁截邊弧背五十五步八分問矢答曰九步術曰半背算七百七十八步四一徑算八千一百二算相乘得六百三十萬五千一百二十一為正實徑乘徑算得七十二萬九千為從方徑算八千一百為上亷徑背相乘得五千二十二為下亷如前法求之平圓徑九十步旁截弧背七十九步二分問矢答曰矢一十八步術曰半弧算一千五百六十八步一六徑算八千一百二算相乘得一千二百七十萬二千九十六為正實徑乘徑算得七十二萬九千為益從方徑算八千一百為上亷徑背相乘得七千一百二十八為下亷初商一十置一於左上為法置一乘上亷得八萬一千以減從方餘六十四萬八千置一自之得一百以減下亷餘七千二十八置一乘餘下亷得七萬二百八十併減餘從方共七十一萬八千二百八十為下法與上法相乘除實七百一十八萬二千八百餘實五百五十一萬九千二百九十六未盡次商八置一於左次為上法倍初商加次商得二十八以乘上亷得二十二萬六千八百以減益從方餘五十萬二千二百為從方併初次商得一十八自之得三百二十四加初商自之一百為四百二十四以減下亷餘六千七百四倍初商加次商得二十八因之得一十八萬七千七百一十二併入從方共六十八萬九千九百一十二為下法與上法相乘除實盡解曰徑除矢算得半背弦差今以弧背求矢故亦用半背算與徑算相乘為實以徑乘徑算為從方而從方內多一矢乘徑算之數故以徑算為上亷以矢乘而減之然從方得矢之方而未得矢之亷也故又以全背與徑相乘為下亷而下亷之中又多一矢自乘之數故又約矢以減之而以餘數乘矢為下亷併從方以為法假如周天徑一百二十一度七十五分二十五秒厯書中不用秒故因之黃赤道內外弧背二十四度問矢度答曰四度八十四分八十二秒術曰半弧背自之得五百七十六度為半弧背算周天徑自之得一萬四千八百二十三度六分二十五秒為徑算二算相乘得八百五十三萬八千八十四度為正實徑乘徑算得一百八十萬四千七百七度八十五分九十三秒七五為益從方以徑算為上亷倍半弧背得四十八度以乘周徑得五千八百四十四度為下亷初商四度置一於左上為法置一乘上亷得五萬九千二百九十二度二十五分以減益從方餘一百七十四萬五千四百一十五度六十分九十三秒七五置一自之得一十六度以減下亷餘五千八百二十八度又以四度因之得二萬三千三百一十二度為從亷併從方共一百七十六萬八千七百二十七度六十分九十三秒七五為下法與上法相乘除實七百七萬四千九百一十度四十三分七十五秒餘實一百四十六萬三千一百七十三度五十六分二十五秒次商八十分置一於左上為法置一倍初商共八度八十分以乘上亷得一十三萬四百四十三度九十五分以減益從方餘一百六十七萬四千二百六十四度九十分九十三秒七五為從方置一併初商自之得二十三度四分加初商自之一十六度共三十九度四分以減下亷餘五千八百四度九十六又以八度八十分因之得五萬一千八十三度六十四分八十秒為從亷併從方共一百七十二萬五千三百四十八度五十五分七十三秒七五為下法與上闕度九十九分一十八秒五二七六又以九度六十九分六十二秒乘之得五萬六千二百八度七十九分二十四秒二七三一五一二為從亷併從方共一百七十一萬七千一百八十九度二十七分三十一秒六五二三一五一二為下法與上法相乘除實三百四十三度四十三分七十八秒五四六三三四六三二四餘實一百五度九分五十五秒五三一七六九六九七六不勾一秒之數圓徑與弧背求截弦術曰求得矢用矢求弦術圓徑與弧背求截積術曰求得矢用矢徑求積截積與截矢求截弦術曰倍積減矢算餘如矢而一即弦又曰倍積以矢除之減矢圓不知徑從旁截積二百八十三步二分步之一矢闊九步問截弦答曰截弦五十四步術曰倍積得五百六十七步減矢算八十一餘四百八十六以矢除之得五十四為弦圓不知徑從旁截積八百一十步矢闊一十八步問截弦答曰截弦長七十二步術同截積與截弦求截矢術曰倍積以弦為從方平方開之圓不知徑從旁截積二百八十三步二分步之一截弦長五十四步問矢答曰九步術曰倍積得五百六十七為實以五十四為從方約商九置一於左上為法置一帶從得六十三為下法與上法相乘除實盡圓不知徑從旁截積八百一十步弦長七十二步問矢答曰矢一十八步術曰倍積得一千六百二十為實以七十二為從方初商一十置一於左上為法置一帶從方共八十二為下法與上法相乘除實八百二十餘實八百倍初商得二十帶從方共九十二為方法次商八置一於左上為法置一帶方法共一百為下法與上法相乘除實盡截積與截矢求圓徑術曰先求出弦半之為算如矢而一即矢徑差又曰積自乘減矢自乘乘積餘為實矢自乘再乘為法除之加虛隅即徑圓不知徑從旁截積六十二步半矢五步問徑術曰積自之得三千九百六步二五矢自之乘積得一千五百六十二步五相減餘二千三百四十三步七五為實矢自乘再乘得一百二十五為法除之得一十八步七五矢乘虛隅一步二分五釐得六步二分五釐加入即圓徑二十五截積與截弦求圓徑術曰先求得矢矢除半弦算加矢即徑圓不知徑從旁截積一千三百一十二步半截弦長八十步問圓徑幾何答曰圓徑八十九步術曰先倍積以弦為從方平方開之得矢二十五步後用半弦自之得一千六百步以矢除之得六十四為矢徑差加矢即圓徑截積與截矢求截弧背弦求弧背同術曰先求得徑以除矢算得半背弦差截矢與弦求圓徑術曰半弦自之如矢而一為矢徑差圓不知徑從旁截一弧矢闊九步弦長五十四步問圓徑答曰圓徑九十步術曰半弦自之得七百二十九以矢除之得八十一為矢徑差加矢即徑截矢與弦求截弧背術曰先求得徑以除矢算為半背弦差截矢與截弦求截積術曰以矢加弦以乘矢得二積截弦與外周求截矢外周乃割殘之周也術曰弦算半弦算相乘四而三之為實併弦及殘周乘半弦算為益方倍半弦算加弦算為從上亷併弦及殘周為下亷以隅併上亷減從以餘從併下亷為法三乘方法開之平圓旁割一弧截處弦五十四步外殘周二百一十四步二分問截矢幾何答曰矢九步術曰弦自之得二千九百一十六為弦算半弦自之得七百二十九為半弦算二算相乘得二百一十二萬五千七百六十四四而三之得一百五十九萬四千三百二十三為正實弦併殘周共二百六十八步二分以半弦算乘之得一十九萬五千五百一十七步八分為益方倍半弦算加全弦算得四千三百七十四為從上亷弦併殘周得二百六十八步二分為下亷一為隅法商得九置一於左上為法置一乘上亷得三萬九千三百六十六為減亷置一自之為八十一以乘下亷得二萬一千七百二十四步二分為益亷置一自乘再乘得七百二十九為隅法併入減亷共四萬九十五以減從方餘一十五萬五千四百二十二步八分併入下亷共一十七萬七千一百四十七步為下法圓田一段西邊被水浸入一弧弦長二十步外殘周五十三步問矢闊田徑田積答曰截矢闊五步圓徑二十五步弧背二十二步術曰如積求之得三萬為正實七千三百為益方六百為從上亷七十三為益下亷一為正隅三乘方開之得矢闊矢除半弦算加矢得徑倍矢算以徑除之得背弦差加弦即弧背徑自之四而三之得田積圓田水浸一弧弦長七十二步外有殘周一百九十步八分問矢闊答曰矢闊一十八步弧背七十九步二分圓徑九十步原田二十五畝三分一釐二毫五絲術曰先求矢闊弦算五千一百八十四半弦算一千二百九十六相乘得六百七十一萬八千四百六十四步四歸三因得五百三萬八千八百四十八為正實併弦及殘周共二百六十二步八分以半弦算乘之得三十四萬五百八十八步八分為益從方倍半弦算加全弦算得七千七百七十六為減上亷弦併殘周二百六十二步八分為益下亷初商一十置一於左上為法置一乘減上亷得七萬七千七百六十為減亷置一自之以乘益下亷得二萬六千二百八十為益亷置一自乘再乘得一千為減隅併入減亷共七萬八千七百六十為減從之算以減益方餘二十六萬一千八百二十八步八分為從方併益亷共二十八萬八千一百八步八分為下法與上法相乘除實二百八十八萬一千八十八餘實二百一十五萬七千七百六十未盡二因減上亷得一十五萬五千五百二十三因益下亷得七萬八千八百四十為益亷之方四因隅法得四千為方法又以初商三之以乘益下亷得七千八百八十四為益亷之亷初商自之六因得六百為隅上亷初商四之得四十為隅下亷次商八置一於左上為法置一乘初減上亷得六萬二千二百八加入前二因上亷得二十一萬七千七百二十八為減亷置一乘益亷之亷得六萬三千七十二步併益亷之方共一十四萬一千九百一十二為益亷之算置一自之以乘初益下亷得一萬六千八百一十九步二分併入益亷之算共一十五萬八千七百三十一步二分為益亷置一乘隅上亷得四千八百置一自之以乘隅下亷得二千五百六十置一自乘再乘得五百一十二為隅法併方法上下亷隅法共一萬一千八百七十二為減隅併減亷共二十二萬九千六百為減從之算以減原從餘一十一萬九百八十八步八分加益亷共二十六萬九千七百二十為下法與上法相乘除實盡矢除半弦算得七十二為矢徑差加矢即圓徑倍矢算以圓徑除之得七步二分為弦背差加弦即弧背圓徑自之四而三得六千七十五步以畝約之為畝解曰求矢者起於弦與徑今不知徑而有殘周故以弦自乘半弦自乘相乘為實方中取圓故四而三之為三乘方實以弦併殘周與半弦算相乘為從方而從方之中又多一弦算兩半弦算及矢自乘再乘之數故以全弦算與倍半弦算為上亷併求出矢自乘再乘之數以減之却以弦併殘周為益下亷以求出矢兩度乘之併餘從以為法蓋隅與上亷專主於減從而下亷所以益從也弦算為平方以弦乘之為立方又以半弦算乘是為三乘方正實