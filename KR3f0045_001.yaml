一徽答曰八十四步術曰分母通其全分子從之又一百五十七因得六十五萬九千四百為實分母五十因得七千八百五十為法又曰分母通其全分子從之得四千二百如五十而一宻答曰八十四步一百五十七分步之一十二術曰分母通其全分子從之又二十二因得九萬二千四百為實七因分母得一千九十九為法圓徑二十六歩一十一分步之八問周古法答曰八十步一十一分步之二術曰分母通其全分子從之得二百九十四又三因得八百八十二為實如分母而一徽答曰八十三步二百七十五分步之二百五十四術曰分母通其全分子從之又一百五十七因得四萬六千一百五十八為實五十因分母得五百五十為法宻答曰八十四步術曰分母通其全分子從之又二十二因得六千四百六十八為實七因分母得七十七為法又曰分母通其全分子從之倍之得五百八十八如七而一圓周求積周八十四問積古術答曰五百八十八步術曰周自之得七千五十六如圓法十二而一徽答曰五百六十一步一百五十七分步之一百二十三術曰周自之又二十五因得一十七萬六千四百為實如三百一十四而一宻答曰五百六十一步一十一分步之三術曰周自之七因得四萬九千三百九十二為實如八十八而一圓周八十七步二十五分步之二十三問積古法答曰六百四十四步一千八百七十五分步之三百一術曰分母通其全分子從之得二千一百九十八自之得四百八十三萬一千二百四為實分母自之得六百二十五又十二因得七千五百為法徽答曰六百一十五步二十五分步之一十一術曰分母通其全分子從之自乗又以二十五乗之得一億二千七十八萬一百為實分母自乗又以三百一十四乗之得一十九萬六千二百五十為法除之不盡八萬六千三百五十法實皆七千八百五十約之宻答曰六百一十四步一萬三千七百五十分步之一萬二千一百七術曰分母通其全分子從之自乗又七因得三千三百八十一萬八千四百二十八為實分母自乗又八十八因得五萬五千為法除之不盡四萬八千四百二十八法實皆四約之周八十八步問積古法答曰六百四十五步三分步之一術曰周自之得七千七百四十四如十二而一徽答曰六百一十六步一百五十七分步之八十八術曰周自乗二十五因得一十九萬三千六百為實如三百一十四而一宻答曰六百一十六步術曰周自之七因得五萬四千二百八為實如八十八而一圓徑求積圓徑二十八步問積古術答曰五百八十八步術曰徑自乗四歸三因徽答曰六百一十五步二十五分步之一十一術曰徑自乗以七十八步半因之得六萬一千五百四十四如百而一宻答曰六百一十六步術曰徑自乗一十一因得八千六百二十四如一十四而一圓徑二十六步一百五十七分步之一百一十八問積古法答曰五百三十六步二萬四千六百四十九分六步之一萬八千一百三十術曰分母通其全分子從之自乗四歸三因得一千三百二十三萬為實分母自之得二萬四千六百四十九為法徽答曰五百六十一步二萬四千六百四十九分步之一萬九千三百一十一術曰分母通其全加分子自乗又以七十八步半乗之得一十三億八千四百七十四萬為實分母自乗百因得二百四十六萬四千九百為法宻答曰五百六十二步二萬四千六百四十九分步之七千二百六十二術曰分母通其全加分子自乗得數又以一十一因之得一億九千四百四萬為實分母相乗又十四因之得三十四萬五千八十六為法除之未盡一十萬一千六百六十八法實皆一十四約之圓徑二十六步一十一分步之八問積古法答曰五百三十五步一百二十一分步之九十二術曰分母通其全加分子自乗得數四而三之得六萬四千八百二十七為實分母相乗為法徽答曰五百六十步六千五十分步之四千六百一十三術曰分母乗其全加分子自乗又以一百五十七乗之得一千三百五十七萬四百五十二為實分母自乗二百因之得二萬四千二百為法宻答曰五百六十一步一十一分步之三術曰分母通其全加分子自乗又一十一因之得九十五萬七百九十六為實分母自之又十四因之得一千六百九十四為法圓積求周圓積五百八十八步問周古法答曰周八十四步術曰十二因積平方開之徽答曰八十五步一萬七千一百分步之一萬六千五百二十八術曰積三百一十四因得一十八萬四千六百三十二以二十五除之得七千三百八十五步二八平方開之宻答曰八十五步一百七十一分步之一百六十七術曰積八十八因得五萬一千七百四十四七除之得七千三百九十二平方開之平方還原方自乗以分母乗之得一百二十三萬五千四百七十五分母子相乗得二萬八千五百五十七為益實併得一百二十六萬四千三十二為實分母為法除之還原圓積六百一十六步問周古法答曰周八十五步一百七十一分步之一百六十七術曰十二因積得七千三百九十二為實平方開之徽答曰八十七步一萬七千五百分步之一萬六千七百九十六術曰積三百一十四因得一十九萬三千四百二十四以二十五除之得七千七百三十六步九六平方開之不盡者以百因約之宻答曰八十八步術曰積八十八因得五萬四千二百八以七除之得七千七百四十四平方開之圓積五百六十一步一百五十七分步之一百二十三問周幾何古法答曰周八十二步二萬五千九百五分步之二千七百三十二術曰分母乗其全加分子得八萬八千二百以圓法十二因之得一百五萬八千四百為實以一百五十七為隅法作𢃄從隅開平方法除之初商八十置一於左上為法置一乗從隅得一萬二千五百六十為隅法與上法相乗除實一百萬四千八百餘五萬三千六百未盡倍隅法得二萬五千一百二十為亷法約次商二置一於左次為上法置一乗從隅得三百一十四併入亷法共二萬五千四百三十四為下法與上法相乗除實五萬八百六十八尚餘二千七百三十二倍八十二加一筭以分母乗之為母約之又術分母通其全加分子十二因之得一百五萬八千四百又以母乗之得一億六千六百一十六萬八千八百平方開之得一萬二千八百九十餘實一萬六千七百未盡另寄將開出之數以分母約之得八十二仍未盡一十六以分母乗之得二千五百一十二加入寄位共一萬九千二百一十二為不盡之數倍八十二加一筭得一百六十五以分母乗之得二萬五千九百五徽答曰八十四步術曰分母通其全加分子得八萬八千二百以三百一十四因得二千七百六十九萬四千八百以二十五因分母得三千九百二十五為法除之得七千五十六平方開之宻答曰八十四步二千四十一分步之一百八術曰分母通其全加分子得八萬八千二百又八十八因得七百七十六萬一千六百七因分母作一千九十九除之得七千六十二餘實四百六十二未盡置七千六十二平方開之得八十四餘六未盡以分母通之得九百四十二加前未盡共一千四百四倍八十四加一筭得一百六十九以分母乗之得二萬六千五百三十三是謂二萬六千五百三十三分步之一千四百四法實皆十三約之得二千四十一分步之一百八積四十五步一十一分步之九爲宻圓周幾何答曰二十四步術曰分母乗其全加分子得五百四以八十八因之得四萬四千三百五十二以七因分母為七十七除得五百七十六平方開之右四元玉鑑所載不用從隅圓積求徑圓積五百八十八步問徑古法答曰二十八步積三歸四因平方開之徽答曰二十七步八千六百三十五分步之三千一百四十七術曰積百因得五萬八千八百以七十八步半為從隅平方開之初商二十置一於左上為法置一乗從隅得一千五百七十為隅法與上法相乗除實三萬一千四百餘實二萬七千四百未盡倍隅法得三千一百四十為亷法約次商七置一於左次為上法置一乗從隅得五百四十九步半併亷法共三千六百八十九步半為下法與上法相乗除實二萬五千八百二十六步半餘實一千五百七十三步半倍二十七加一筭得五十五以七十八步半因之得四千三百一十七步半法實皆倍命之宻答曰二十七步六百五分步之二百一十三術曰積一十四因得八千二百三十二以一十一為從隅平方開之初商二十置一於左上為法置一乗從隅得二百二十為隅法與上法相乗除實四千四百餘實三千八百三十二倍隅法得四百四十為亷法約次商七置一於左次為上法置一乗從隅得七十七為隅法併亷隅共五百一十七為下法與上法相乗除實三千六百一十九餘實二百一十三未盡如前法約之積六百一十五步二十五分步之一十一問徑古法答曰二十八步四千二百七十五分步之二千七百四十四術曰分母乗其全加分子得一萬五千三百八十六以四因之得六萬一千五百四十四分母三之為七十五為從隅平方開之餘實二千七百四十四倍開出之數加一算得五十七以從隅因之得四千二百七十五為母約之徽答曰二十八步術曰以積分母除分子得四分四釐加全步得六百一十五步四分四釐百之得六萬一千五百四十四為正實以七十八步五分為從隅平方開之宻答曰二十七步一萬五千一百二十五分步之一萬四千九百二十九術曰置積以分母通之加分子得一萬五千三百八十六以一十四因之得二十一萬五千四百四為正實以二百七十五為從隅平方開之餘實一萬四千九百二十九倍徑加一算以從隅乗之為分母約之平圓積四十五步一十一分步之九問宻圓徑幾何答曰七步一十一分步之七術曰分母乗其全加分子以一十四乗之得七千五十六平方開之得八十四以一十一除之不盡七還原法曰分母乗七加分子自之又一十一因得七萬七千六百一十六為實分母自之又一十四因得一千六百九十四為法除之得四十五餘一千三百八十六法實皆一百五十四約之還原數黄鍾算附假如黄鍾之管空容九分問圍圓幾何答曰圍圓一十分三釐二百七分釐之一百九十一此以圍三徑一求之十二因積得一百八平方開之以徽術推之得幾答曰圍一十分七釐二百一十五分釐之五十五術曰積三百一十四因得二千八百二十六以二十五除之得一百一十三四平方開之以宻術推之得幾答曰圍一十分一百四十七分分之九十二術曰積八十八因得七百九十二如七而一得一百一十三七分之一平方開之不盡一十三以七因加一為子倍十分加一七因為母命之黄鍾之管空容九分問徑答曰徑三分四釐六毫六百九十三分毫之二百八十四此用三歸四因平方開之以徽術求之答曰徑三分三釐八毫五十三萬一千四百四十五分毫之三萬一千八百四十六術曰百因積得九百分以七十八分半為從隅平方法開之初商三分置一於左上為法置一乗從隅得二百三十五分五釐為下法與上法相乗除實七百六分半餘實一百九十三分半倍隅法得六分為㢘法次商三釐置一於左上為法置一併亷法共六十三釐以乗從隅得四千九百四十五釐五毫與上法相乗除實一百四十八分三釐六毫五絲餘實四十五分一釐三毫五絲倍初次商得六分六釐為亷法三商八毫置一於左上為法置一併亷法共六分六釐八毫以乗從隅得五百二十四分三釐八毫與上法相乗除實四十一分九釐五毫四忽餘實三分一釐八毫四絲六忽倍商加一算以從隅乗之為分母命之以宻術求之得徑幾答曰徑三分三釐七百三十七分釐之六百二十一術曰一十四因積得一百二十六以一十一為從隅平方開之初商三分置一於左上為法置一乗從隅得三十三分與上法相乗除實九十九分餘實二十七分倍下法得六分為亷法次商三釐置一為上法置一併亷法乗從隅得六百九十三釐與上法相乗除實二十分七釐九毫餘實六分二釐一毫倍商加一算以從隅因之得七百三十七為分母命之還原曰徑相乗得一十分八釐九毫以一十一因得一百一十九分七釐九毫加不盡四分二釐一毫得原數黄鍾之大小不係於此但假此以明數之㣲妙耳嘗觀儒者之論律管徃徃泥於數而不察夫理假如黄鍾之實乃十一度三因以起十一律之數律管以三分為損益故十一度三之非實有數也實乃算法中之實耳雖蔡九峯亦謂仲呂之實數不可三其數不行此律之所以止於十二也殊不知五音六律乃天地隂陽自然之理聖人因之製管以宣其聲而又三分損益以定其管之長短使其無相奪倫顧乃以數為造律之本豈不謬哉律管算附律管以三分損益故止立二三四乗除之法二一如二二二如四二三如六二四如八二五作一一二六作一三二七作一五二八作一七二九作二三一如三三二如六三三作一三四作一三三五作一六三六作二三七作二三三八作二六三九作三四一如四四二如八四三作一三四四作一七四五作二二四六作二六四七作三一四八作三五四九作四右因二歸逢一作四一逢二進一三歸逢一作三逢二作六逢三進一四歸逢一作二一逢二作四二逢三作六三逢四進一右歸黄鍾管長九寸三歸二因林鍾管長六寸三歸四因太簇管長八寸三歸二因南呂管長五寸三分三歸四因姑洗管長七寸一分三歸二因應鍾管長四寸六分六釐三歸四因㽔賔管長六寸二分八釐三歸四因大呂管長八寸三分七釐六毫三歸二因夷則管長五寸五分五釐一毫三歸四因夾鍾管長七寸四分三釐七毫三絲三歸二因無射管長四寸八分八釐四毫八絲三歸四因仲呂管長六寸五分八釐三毫四絲六忽右術止用九寸損益以定十一律管不必用十一度三因若求變黄鍾就以仲呂之管三歸四因即是不必更用七百二十九乗之數弧矢算術
