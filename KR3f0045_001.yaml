body:
  text: 弧矢筭術明顧應祥撰圓徑與截矢求截弦術曰半徑為弦半徑减矢為股各自乗相减餘為勾筭平方開之得勾即半截弦又曰以矢减徑以矢乗之即半截弦筭圓徑十寸從旁截一弧矢闊一寸問截弦答曰六寸術曰半徑自之得二十五半徑减矢自之得一十六寸相减餘九平方開之得三倍之即截弦又曰圓徑自之得一百為弦筭圓徑减倍矢自之得六十四為股筭相减餘三十六為勾筭平方開之得全弦圓徑十三步截矢闊四歩問截弦答曰十二歩術曰半徑筭四十二步二五减矢半徑筭六歩二五相减餘三十六歩為勾筭又曰全徑筭一百六十九减倍矢徑筭二十五相减餘一百四十四平方開之得全截弦圓徑九十歩截矢九歩問截弦答曰五十四步術同圓材徑二尺五寸鋸板欲厚七寸問闊幾何答曰板闊二尺四寸術曰圓徑為弦自之得六十二尺五寸板厚為勾自之得四尺九寸相减得五十七尺六寸為股筭平方開之闕商得一寸置一於左上為法置一乗上亷仍得一十四寸置一隅因得五以减下亷餘三十五寸置一自之以乗下亷仍得三十五寸併上亷得四十九為下法圓徑九十歩從旁截積二百八十三歩半問截矢答曰矢九歩術曰倍積自之得三十二萬一千四百八十九歩為正實四因積得一千一百三十四為上亷四因徑得三百六十為下亷五為負隅商得九置一於左上為法置一乗上亷得一萬二百六置一隅因得四十五以减下亷餘三百一十五置一自之以乗餘下亷得二萬五千五百一十五併上亷共二萬五千七百二十一為下法圓徑九十歩從旁截積八百一十歩問矢荅曰矢一十八歩術曰倍積自之得二百六十二萬四千四百爲正實四因截積得三千二百四十為從上亷四因圓徑得三百六十為從下亷五爲負隅初商一十置一於左上為法置一乗上亷得三萬二千四百置一以隅因之得五十以减從下亷餘三百一十置一自之以乗餘下亷得三萬一千併上亷共六萬三千四百為下法與上法相乗除實六十三萬四千餘實一百九十九萬四百未盡倍上亷得六萬四千八百初商自之三因得三百為下亷方法初商三之得三十為下亷亷法初商自乗再乗隅因得五千為下亷减隅次商八置一於左上為法置一乗上亷得二萬五千九百二十併倍上亷共九萬七百二十置一併入初商得一十八以隅因之得九十以减從下亷餘二百七十以方法乗之得八萬一千置一乗亷法得二百四十以乗餘下亷得六萬四千八百置一自之得六十四以乗餘下亷得一萬七千二百八十减去减隅五千止存一萬二千二百八十下亷方亷隅共一十五萬八千八十併上亷共二十四萬八千八百為下法與上法相乗除實盡又術次商八置一於左上為法倍初商加次商得二十八以乗上亷得九萬七百二十置一隅因得四十以减餘下亷止存二百七十倍初商加次商併初次商因之得五百四加初商自之一百共六百四以乗二百七十得一十六萬三千八十以初商自乗再乗隅因得五千减之止存一十五萬八千八十併上亷共二十四萬八千八百為下法又為添積開三乗方法術曰倍積自之得二百六十二萬四千四百為正實四因截積得三千二百四十為上亷四因圓徑得三百六十為下亷五為負隅初商一十置一於左上為法置一自之又自之得一萬為三乗方面以隅因之得五萬為益實加入正實得二百六十七萬四千四百為通實置一乗上亷得三萬二千四百置一自之以乗下亷得三萬六千併上亷共六萬八千四百為下法與上法相乗除實六十八萬四千餘實一百九十九萬四百未盡為次商正實次商八置一於左上為法置一加初商自之又自之得一十萬四千九百七十六為三乗方面以隅法因之得五十二萬四千八百八十内减初益實五萬餘四十七萬四千八百八十為益實加入次正實共二百四十六萬五千二百八十為通實倍初商加次商得二十八以乗上亷得九萬七百二十倍初商加次商得二十八併初次商一十八相因加初商自乗共六百四以乗下亷得二十一萬七千四百四十併上亷共三十萬八千一百六十與上法相乗除實盡圓徑八十九歩從旁截積一千三百一十二歩半問截矢答曰矢二十五歩不用倍積術曰積自之得一百七十二萬二千六百五十六歩二五截積一千三百一十二歩半為上亷徑八十九歩為下亷以一歩二分五釐為負隅初商二十置一於左上為法置一乗上亷得二萬六千二百五十置一以隅因之得二十五以减下亷餘六十四置一自之以乗餘下亷得二萬五千六百併上亷得五萬一千八百五十為下法與上法相乗除實一百三萬七千餘實六十八萬五千六百五十六歩二五未盡次商五置一於左上為法置一以隅因之得六歩二分五釐以减餘下亷餘五十七歩七分五釐倍初商加次商得四十五以乗上亷得五萬九千六十二半倍初商加次商併初次商因之得一千一百二十五加初商自之四百共一千五百二十五以乗餘下亷得八萬八千六十八歩七五内减初商自乗再乗隅因一萬止存七萬八千六十八歩七五併上亷共一十三萬七千一百三十一歩二五與上法相乗除實盡解曰弧矢狀類勾股勾股得直方之半故倍其積以股除之即得勾弧背曲倍積則長一弦而又一矢以矢乗積倍之恰得一弦一矢之數因未知矢故以積自乗為實約矢一度乗積以為上亷兩度乗徑以為下亷併之為法而後可以得矢用三乗者何也積本平方以積乗積是兩度平方矣故用三乗方法開之上亷下亷俱用四因者何也倍積則乗出之數為積者四故上下亷俱四以就之减徑者何也徑乃圓之全徑矢乃截處之勾矢本减徑而得故亦减徑以求矢五為負隅者何也凡平圓之積得平方四之三在内者七五在外者二五不拘圓之大小毎方一尺該虚隅二寸五分四其矢得四四其虚隅得一合而為五亦升實就法之意如不倍積亷不用四因以一二五為隅法亦通或不减徑作添積三乗方法亦通圓徑與截積求截弦術曰倍積以矢除之减矢即弦又法用矢徑求弦術圓徑八十九歩從旁截積一千三百一十二歩半問截弦答曰弦八十歩術曰倍積得二千六百二十五歩以求出矢二十五除之得一百五歩乃一弦一矢减矢即弦又曰倍矢减徑餘三十九自之得一千五百二十一為勾筭全徑自之得七千九百二十一為弦筭相减餘六千四百為股筭平方開之若求弧背以徑除矢筭即半背弦差圓徑與弧背求矢術曰半弧筭徑筭相乗為實徑乗徑筭為從方徑筭為上亷徑背相乗為下亷以上亷减從以隅减下亷三乗方法開之平圓徑十尺從旁截處弧背八尺八寸問矢答曰矢二尺術曰半弧背自之得一十九尺三寸六分徑自之得一百尺相乗得一千九百三十六尺為正實徑乗徑筭得一千尺為從方徑筭一百尺為上亷全背乗徑得八十八尺為下亷約商二尺置一於左上為法置一乗上亷得二百尺以减從方餘八百尺置一自之得四以减下亷餘八十四尺又以二乗餘下亷得一百六十八尺併從方共九百六十八尺為下法又術商矢减徑存八尺以矢乗之得十六平方開之即得半弦平圓徑九十歩旁截邊弧背五十五歩八分問矢答曰九歩術曰半背筭七百七十八歩四一徑筭八千一百二筭相乗得六百三十萬五千一百二十一為正實徑乗徑筭得七十二萬九千為從方徑筭八千一百為上亷徑背相乗得五千二十二為下亷如前法求之平圓徑九十歩旁截弧背七十九歩二分問矢答曰矢一十八歩術曰半弧筭一千五百六十八歩一六徑筭八千一百二筭相乗得一千二百七十萬二千九十六為正實徑乗徑筭得七十二萬九千為益從方徑筭八千一百為上亷徑背相乗得七千一百二十八為下亷初商一十置一於左上為法置一乗上亷得八萬一千以减從方餘六十四萬八千置一自之得一百以减下亷餘七千二十八置一乗餘下亷得七萬二百八十併减餘從方共七十一萬八千二百八十為下法與上法相乗除實七百一十八萬二千八百餘實五百五十一萬九千二百九十六未盡次商八置一於左次為上法倍初商加次商得二十八以乗上亷得二十二萬六千八百以减益從方餘五十萬二千二百為從方併初次商得一十八自之得三百二十四加初商自之一百為四百二十四以减下亷餘六千七百四倍初商加次商得二十八因之得一十八萬七千七百一十二併入從方共六十八萬九千九百一十二為下法與上法相乗除實盡解曰徑除矢筭得半背弦差今以弧背求矢故亦用半背筭與徑筭相乗為實以徑乗徑筭為從方而從方内多一矢乗徑筭之數故以徑筭為上亷以矢乗而减之然從方得矢之方而未得矢之亷也故又以全背與徑相乗為下亷而下亷之中又多一矢自乗之數故又約矢以减之而以餘數乗矢為下亷併從方以為法假如周天徑一百二十一度七十五分二十五秒厯書中不用秒故因之黄赤道内外弧背二十四度問矢度答曰四度八十四分八十二秒術曰半弧背自之得五百七十六度為半弧背筭周天徑自之得一萬四千八百二十三度六分二十五秒為徑筭二筭相乗得八百五十三萬八千八十四度為正實徑乗徑筭得一百八十萬四千七百七度八十五分九十三秒七五為益從方以徑筭為上亷倍半弧背得四十八度以乗周徑得五千八百四十四度為下亷初商四度置一於左上為法置一乗上亷得五萬九千二百九十二度二十五分以减益從方餘一百七十四萬五千四百一十五度六十分九十三秒七五置一自之得一十六度以减下亷餘五千八百二十八度又以四度因之得二萬三千三百一十二度為從亷併從方共一百七十六萬八千七百二十七度六十分九十三秒七五為下法與上法相乗除實七百七萬四千九百一十度四十三分七十五秒餘實一百四十六萬三千一百七十三度五十六分二十五秒次商八十分置一於左上為法置一倍初商共八度八十分以乗上亷得一十三萬四百四十三度九十五分以减益從方餘一百六十七萬四千二百六十四度九十分九十三秒七五為從方置一併初商自之得二十三度四分加初商自之一十六度共三十九度四分以减下亷餘五千八百四度九十六又以八度八十分因之得五萬一千八十三度六十四分八十秒為從亷併從方共一百七十二萬五千三百四十八度五十五分七十三秒七五為下法與上闕度九十九分一十八秒五二七六又以九度六十九分六十二秒乗之得五萬六千二百八度七十九分二十四秒二七三一五一二為從亷併從方共一百七十一萬七千一百八十九度二十七分三十一秒六五二三一五一二為下法與上法相乗除實三百四十三度四十三分七十八秒五四六三三四六三二四餘實一百五度九分五十五秒五三一七六九六九七六不勾一秒之數圓徑與弧背求截弦術曰求得矢用矢求弦術圓徑與弧背求截積術曰求得矢用矢徑求積截積與截矢求截弦術曰倍積减矢筭餘如矢而一即弦又曰倍積以矢除之减矢圓不知徑從旁截積二百八十三歩二分歩之一矢闊九歩問截弦答曰截弦五十四歩術曰倍積得五百六十七歩减矢筭八十一餘四百八十六以矢除之得五十四為弦圓不知徑從旁截積八百一十步矢闊一十八步問截弦答曰截弦長七十二歩術同截積與截弦求截矢術曰倍積以弦為從方平方開之圓不知徑從旁截積二百八十三歩二分歩之一截弦長五十四步問矢答曰九歩術曰倍積得五百六十七為實以五十四為從方約商九置一於左上為法置一帶從得六十三為下法與上法相乗除實盡圓不知徑從旁截積八百一十歩弦長七十二歩問矢答曰矢一十八歩術曰倍積得一千六百二十為實以七十二為從方初商一十置一於左上為法置一帶從方共八十二為下法與上法相乗除實八百二十餘實八百倍初商得二十帶從方共九十二為方法次商八置一於左上為法置一帶方法共一百為下法與上法相乗除實盡截積與截矢求圓徑術曰先求出弦半之為筭如矢而一即矢徑差又曰積自乗减矢自乗乗積餘為實矢自乗再乗為法除之加虛隅即徑圓不知徑從旁截積六十二歩半矢五歩問徑術曰積自之得三千九百六歩二五矢自之乗積得一千五百六十二步五相减餘二千三百四十三步七五為實矢自乗再乗得一百二十五為法除之得一十八步七五矢乗虚隅一步二分五釐得六步二分五釐加入即圓徑二十五截積與截弦求圓徑術曰先求得矢矢除半弦筭加矢即徑圓不知徑從旁截積一千三百一十二步半截弦長八十步問圓徑幾何答曰圓徑八十九步術曰先倍積以弦為從方平方開之得矢二十五步後用半弦自之得一千六百步以矢除之得六十四為矢徑差加矢即圓徑截積與截矢求截弧背弦求弧背同術曰先求得徑以除矢筭得半背弦差截矢與弦求圓徑術曰半弦自之如矢而一為矢徑差圓不知徑從旁截一弧矢闊九步弦長五十四步問圓徑答曰圓徑九十步術曰半弦自之得七百二十九以矢除之得八十一為矢徑差加矢即徑截矢與弦求截弧背術曰先求得徑以除矢筭為半背弦差截矢與截弦求截積術曰以矢加弦以乗矢得二積截弦與外周求截矢外周乃割殘之周也術曰弦筭半弦筭相乗四而三之為實併弦及殘周乗半弦筭為益方倍半弦筭加弦筭為從上亷併弦及殘周為下亷以隅併上亷减從以餘從併下亷為法三乗方法開之平圓旁割一弧截處弦五十四步外殘周二百一十四步二分問截矢幾何答曰矢九步術曰弦自之得二千九百一十六為弦筭半弦自之得七百二十九為半弦筭二筭相乗得二百一十二萬五千七百六十四四而三之得一百五十九萬四千三百二十三為正實弦併殘周共二百六十八步二分以半弦筭乗之得一十九萬五千五百一十七步八分為益方倍半弦筭加全弦筭得四千三百七十四為從上亷弦併殘周得二百六十八步二分為下亷一為隅法商得九置一於左上為法置一乗上亷得三萬九千三百六十六為减亷置一自之為八十一以乗下亷得二萬一千七百二十四步二分為益亷置一自乗再乗得七百二十九為隅法併入减亷共四萬九十五以减從方餘一十五萬五千四百二十二步八分併入下亷共一十七萬七千一百四十七步為下法圓田一段西邊被水浸入一弧弦長二十步外殘周五十三步問矢闊田徑田積答曰截矢闊五步圓徑二十五步弧背二十二步術曰如積求之得三萬為正實七千三百為益方六百為從上亷七十三為益下亷一為正隅三乗方開之得矢闊矢除半弦筭加矢得徑倍矢筭以徑除之得背弦差加弦即弧背徑自之四而三之得田積圓田水浸一弧弦長七十二步外有殘周一百九十步八分問矢闊答曰矢闊一十八步弧背七十九步二分圓徑九十歩原田二十五畆三分一釐二毫五絲術曰先求矢闊弦筭五千一百八十四半弦筭一千二百九十六相乗得六百七十一萬八千四百六十四步四歸三因得五百三萬八千八百四十八為正實併弦及殘周共二百六十二步八分以半弦筭乗之得三十四萬五百八十八步八分為益從方倍半弦筭加全弦筭得七千七百七十六為减上亷弦併殘周二百六十二步八分為益下亷初商一十置一於左上為法置一乗减上亷得七萬七千七百六十為减亷置一自之以乗益下亷得二萬六千二百八十為益亷置一自乗再乗得一千為减隅併入减亷共七萬八千七百六十為减從之算以减益方餘二十六萬一千八百二十八步八分為從方併益亷共二十八萬八千一百八步八分為下法與上法相乗除實二百八十八萬一千八十八餘實二百一十五萬七千七百六十未盡二因减上亷得一十五萬五千五百二十三因益下亷得七萬八千八百四十為益亷之方四因隅法得四千為方法又以初商三之以乗益下亷得七千八百八十四為益亷之亷初商自之六因得六百為隅上亷初商四之得四十為隅下亷次商八置一於左上為法置一乗初减上亷得六萬二千二百八加入前二因上亷得二十一萬七千七百二十八為减亷置一乗益亷之亷得六萬三千七十二步併益亷之方共一十四萬一千九百一十二為益亷之筭置一自之以乗初益下亷得一萬六千八百一十九步二分併入益亷之筭共一十五萬八千七百三十一步二分為益亷置一乗隅上亷得四千八百置一自之以乗隅下亷得二千五百六十置一自乗再乗得五百一十二為隅法併方法上下亷隅法共一萬一千八百七十二為减隅併减亷共二十二萬九千六百為减從之筭以减原從餘一十一萬九百八十八步八分加益亷共二十六萬九千七百二十為下法與上法相乗除實盡矢除半弦筭得七十二為矢徑差加矢即圓徑倍矢筭以圓徑除之得七步二分為弦背差加弦即弧背圓徑自之四而三得六千七十五步以畆約之為畆解曰求矢者起於弦與徑今不知徑而有殘周故以弦自乗半弦自乗相乗為實方中取圓故四而三之為三乗方實以弦併殘周與半弦筭相乗為從方而從方之中又多一弦筭兩半弦筭及矢自乗再乗之數故以全弦筭與倍半弦筭為上亷併求出矢自乗再乗之數以减之却以弦併殘周為益下亷以求出矢兩度乗之併餘從以為法盖隅與上亷專主於减從而下亷所以益從也弦筭為平方以弦乗之為立方又以半弦筭乗是為三乗方正實